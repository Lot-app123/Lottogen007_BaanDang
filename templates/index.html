<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOTTO GEN — สร้างเลขหวย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a0b0f;
  --surface:     #111318;
  --surface-2:   #181b22;
  --border:      #1f2330;
  --border-2:    #2a2f40;
  --text:        #e8eaf0;
  --muted:       #5a607a;
  --muted-2:     #3d4257;
  --gold:        #f0c040;
  --gold-dim:    #7a601a;
  --gold-glow:   rgba(240,192,64,.18);
  --green:       #2ecc8a;
  --red:         #ff4d6a;
  --accent:      #4f7fff;
  --radius:      10px;
  --header-h:    56px;
}

html, body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

/* ─── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* ─── Header ─────────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 20;
}

.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon {
  width: 28px; height: 28px;
  background: var(--gold);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #0a0b0f;
  letter-spacing: -.5px; flex-shrink: 0;
}
.logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: .5px; }
.logo-text span { color: var(--gold); }

.header-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

.header-clock { display: flex; align-items: center; gap: 10px; }
.date-pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
  padding: 3px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
}
.time-pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--gold);
  padding: 3px 10px; background: var(--gold-glow); border: 1px solid var(--gold-dim); border-radius: 20px;
  letter-spacing: .5px;
}

.header-user { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.user-badge { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
.user-avatar {
  width: 24px; height: 24px; border-radius: 50%; background: var(--surface-2);
  border: 1px solid var(--border-2); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--gold);
}
.logout-btn {
  font-family: 'Kanit', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted);
  text-decoration: none; padding: 5px 12px; border: 1px solid var(--border-2); border-radius: 6px;
  transition: color .15s, border-color .15s, background .15s;
}
.logout-btn:hover { color: var(--red); border-color: var(--red); background: rgba(255,77,106,.06); }

/* ─── Layout (Desktop First) ─────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 1fr 400px 72px; /* สัดส่วน Desktop */
  /* ใช้ dvh เพื่อป้องกันปัญหาแถบ URL บังด้านล่างในเบราว์เซอร์มือถือ/แท็บเล็ต */
  height: calc(100dvh - var(--header-h)); 
  overflow: hidden;
}

/* ─── Left: Preview ──────────────────────────────────────────── */
.preview-area {
  display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid var(--border); background: var(--bg);
}
.preview-tabs-bar {
  display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--surface); overflow-x: auto; scrollbar-width: none;
}
.preview-tabs-bar::-webkit-scrollbar { display: none; }
.image-tab {
  padding: 14px 14px 12px; font-size: 12px; font-weight: 500; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color .15s; user-select: none; position: relative; top: 1px;
}
.image-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.image-tab:hover:not(.active) { color: var(--text); }

.preview-content {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 32px; overflow: hidden; position: relative;
}
.preview-content::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 30% 40%, rgba(240,192,64,.04) 0%, transparent 70%),
              repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
  opacity: .5; pointer-events: none;
}
.preview-img {
  max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px var(--border); position: relative; z-index: 1;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }

.preview-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  color: var(--muted-2); font-size: 14px; position: relative; z-index: 1;
}
.ph-icon {
  width: 64px; height: 64px; border-radius: 16px; background: var(--surface);
  border: 1px dashed var(--border-2); display: flex; align-items: center; justify-content: center;
}
.ph-icon svg { width: 28px; height: 28px; opacity: .3; }

/* ─── Middle: Panel ──────────────────────────────────────────── */
.panel {
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-header { padding: 14px 16px 0; flex-shrink: 0; }
.panel-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.panel-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: .3px; }
.selected-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  background: var(--bg); padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border);
}

.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
  padding: 7px 12px 7px 32px; font-family: 'Kanit', sans-serif; font-size: 13px; color: var(--text);
  outline: none; transition: border-color .15s; -webkit-appearance: none;
}
.search-wrap input::placeholder { color: var(--muted-2); }
.search-wrap input:focus { border-color: var(--border-2); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none;
}

.panel-list { flex: 1; overflow-y: auto; padding: 2px 0 8px; -webkit-overflow-scrolling: touch; }

.lottery-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  cursor: pointer; transition: background .1s; border-left: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.lottery-row:hover { background: var(--surface-2); }
.lottery-row.checked { background: rgba(240,192,64,.06); border-left-color: var(--gold-dim); }

.cb-wrap { width: 16px; height: 16px; flex-shrink: 0; position: relative; }
.cb-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; }
.cb-box {
  width: 16px; height: 16px; border: 1.5px solid var(--border-2); border-radius: 4px;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, background .15s; pointer-events: none;
}
.cb-wrap input:checked ~ .cb-box { background: var(--gold); border-color: var(--gold); }
.cb-box svg { display: none; }
.cb-wrap input:checked ~ .cb-box svg { display: block; }

.row-label { flex: 1; font-size: 13.5px; font-weight: 400; color: var(--text); user-select: none; }
.lottery-row.checked .row-label { color: var(--gold); font-weight: 500; }
.row-time {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  font-variant-numeric: tabular-nums; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);
}

.panel-footer {
  flex-shrink: 0; padding: 10px 16px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.select-all-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.select-all-label { font-size: 12px; color: var(--muted); user-select: none; }

.btn-generate {
  margin-left: auto; font-family: 'Kanit', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--bg); background: var(--muted-2); border: none; border-radius: 8px;
  padding: 8px 18px; cursor: not-allowed; transition: background .2s, box-shadow .2s, transform .1s;
  letter-spacing: .3px; white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.btn-generate.ready { background: var(--gold); cursor: pointer; box-shadow: 0 0 20px rgba(240,192,64,.3); }
.btn-generate.ready:hover { background: #f5cc55; box-shadow: 0 0 28px rgba(240,192,64,.45); }
.btn-generate.ready:active { transform: scale(.97); }

/* ─── Right: Set tabs ────────────────────────────────────────── */
.set-tabs {
  background: var(--surface); display: flex; flex-direction: column;
  align-items: center; padding: 14px 0; gap: 6px; overflow-y: auto;
}
.set-tab {
  width: 52px; padding: 10px 4px; border-radius: 8px; font-size: 11px; font-weight: 600;
  color: var(--muted); cursor: pointer; text-align: center; border: 1px solid transparent;
  transition: color .15s, border-color .15s, background .15s; line-height: 1.4; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.set-tab:hover { color: var(--text); background: var(--surface-2); }
.set-tab.active { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }

/* Preview Toggle Button (Hidden on Desktop) */
.preview-toggle-btn { display: none; }

/* ─── Loading overlay ────────────────────────────────────────── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(10,11,15,.85); backdrop-filter: blur(6px);
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100;
}
.loading-overlay.show { display: flex; }
.spinner-ring { width: 52px; height: 52px; position: relative; }
.spinner-ring::before, .spinner-ring::after { content: ''; position: absolute; border-radius: 50%; border: 2px solid transparent; }
.spinner-ring::before { inset: 0; border-top-color: var(--gold); animation: spin 1s linear infinite; }
.spinner-ring::after { inset: 6px; border-top-color: rgba(240,192,64,.3); animation: spin .7s linear infinite reverse; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; font-weight: 500; color: var(--muted); letter-spacing: .5px; }
.loading-text span { color: var(--gold); }
.empty-list { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px; color: var(--muted-2); font-size: 13px; }
.match { color: var(--gold); }

/* ═══════════════════════════════════════════════════════════════
   TABLET & IPAD (Responsive RWD) — 641px to 1024px
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 1024px) and (min-width: 641px) {
  .app {
    grid-template-columns: 1fr 340px; 
    grid-template-rows: auto 1fr;
  }
  
  .preview-area { grid-column: 1 / 2; grid-row: 1 / 3; }
  
  .set-tabs {
    grid-column: 2 / 3; grid-row: 1 / 2; flex-direction: row; height: auto;
    padding: 12px 14px; border-right: none; border-bottom: 1px solid var(--border);
    justify-content: flex-start; overflow-x: auto; scrollbar-width: none;
  }
  .set-tabs::-webkit-scrollbar { display: none; }
  
  .set-tab { width: auto; min-width: 64px; padding: 6px 16px; font-size: 12px; border-radius: 20px; white-space: nowrap; }
  
  /* เพิ่ม min-height: 0 เพื่อแก้ปัญหาปุ่มสร้างรูปภาพทะลุขอบจอบน iPad */
  .panel { grid-column: 2 / 3; grid-row: 2 / 3; border-top: none; min-height: 0; }
  .preview-content { padding: 16px; }
}

/* ═══════════════════════════════════════════════════════════════
   MOBILE PORTRAIT (Responsive RWD) — ≤ 640px
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 640px) {
  :root { --header-h: 48px; }
  body { overflow: hidden; height: 100dvh; }

  .date-pill, .user-name, .header-sep { display: none; }
  .logout-btn { padding: 4px 8px; }
  header { padding: 0 14px; }

  .app {
    display: flex;
    flex-direction: column;
    height: calc(100dvh - var(--header-h));
  }

  .set-tabs {
    flex-direction: row; flex-shrink: 0; overflow-x: auto; padding: 8px 12px;
    gap: 6px; border-bottom: 1px solid var(--border); border-right: none;
    height: auto; align-items: center; order: 1; 
  }
  .set-tab { width: auto; min-width: 64px; padding: 6px 12px; font-size: 12px; border-radius: 20px; white-space: nowrap; }

  .preview-area {
    flex-shrink: 0; border-right: none; border-bottom: 1px solid var(--border);
    height: 0; overflow: hidden; transition: height .3s ease; min-height: 0; order: 2;
  }
  .preview-area.expanded { height: 240px; }
  .preview-tabs-bar { padding: 0 12px; }
  .image-tab { padding: 10px 10px 9px; font-size: 11px; }

  .panel { flex: 1; border-right: none; min-height: 0; order: 3; }
  .panel-header { padding: 10px 14px 0; }
  .lottery-row { padding: 11px 14px; }
  
  .panel-footer {
    padding: 10px 16px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .btn-generate { font-size: 14px; padding: 10px 20px; border-radius: 10px; }

  .preview-toggle-btn {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    font-family: 'Kanit', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted);
    cursor: pointer; margin-left: auto; transition: color .15s, border-color .15s; flex-shrink: 0;
  }
  .preview-toggle-btn.active { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-glow); }
  .preview-toggle-btn svg { width: 13px; height: 13px; transition: transform .3s ease; }
  .preview-toggle-btn.active svg { transform: rotate(180deg); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">L</div>
    <span class="logo-text">LOTTO<span>GEN</span></span>
  </div>
  <div class="header-sep"></div>
  <div class="header-clock">
    <span class="date-pill" id="date-display">—</span>
    <span class="time-pill" id="time-display">—:—:—</span>
  </div>
  <div class="header-user">
    <div class="user-badge">
      <div class="user-avatar">{{ user[0]|upper }}</div>
      <span class="user-name" style="font-size:13px;color:var(--muted)">{{ user }}</span>
    </div>
    <div class="header-sep"></div>
    <a href="/logout" class="logout-btn">ออกจากระบบ</a>
  </div>
</header>

<form method="POST" id="main-form">
<div class="app">

  <div class="preview-area" id="preview-area">
    <div class="preview-tabs-bar" id="image-tabs">
      <div class="image-tab active">ตัวอย่าง</div>
    </div>
    <div class="preview-content">
      <img src="/static/Baan.jpg" class="preview-img" id="preview-img" style="display:block"
           onerror="this.style.display='none'; document.getElementById('preview-placeholder').style.display='flex'">
      <div class="preview-placeholder" id="preview-placeholder" style="display:none">
        <div class="ph-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <p>เลือกประเภทหวยแล้วกด <strong style="color:var(--gold)">สร้างรูปภาพ</strong></p>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <span class="panel-title">รายการหวย</span>
        <span class="selected-badge" id="selected-count">เลือก 0 / 0</span>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="ค้นหาหวย..." oninput="renderList()">
      </div>
    </div>
    <div class="panel-list" id="panel-list"></div>
    <div class="panel-footer">
      <label class="select-all-wrap">
        <div class="cb-wrap">
          <input type="checkbox" id="select-all-cb" onchange="toggleAll(this.checked)">
          <div class="cb-box">
            <svg width="9" height="7" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l3 3 5-6" stroke="#0a0b0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <span class="select-all-label">เลือกทั้งหมด</span>
      </label>
      <button type="submit" class="btn-generate" id="btn-gen" disabled>สร้างรูปภาพ</button>
    </div>
  </div>

  <div class="set-tabs" id="set-tabs">
    <div class="set-tab active" data-set="0" onclick="switchSet(0)">SET<br class="desktop-br"> 1</div>
    <div class="set-tab" data-set="1" onclick="switchSet(1)">SET<br class="desktop-br"> 2</div>
    <div class="set-tab" data-set="2" onclick="switchSet(2)">ส-อ</div>
    
    <button type="button" class="preview-toggle-btn" id="preview-toggle-btn" onclick="togglePreview()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      ดูรูป
    </button>
  </div>

</div>
</form>

<div class="loading-overlay" id="loading">
  <div class="spinner-ring"></div>
  <div class="loading-text">กำลังสร้าง <span>รูปภาพ</span>...</div>
</div>

let currentSet = 0;
const selected = new Set();
let previewOpen = false;

function togglePreview() {
  previewOpen = !previewOpen;
  const area = document.getElementById('preview-area');
  const btn  = document.getElementById('preview-toggle-btn');
  area.classList.toggle('expanded', previewOpen);
  btn.classList.toggle('active', previewOpen);
}

function updateClock() {
  const now = new Date();
  const opts = { timeZone: 'Asia/Bangkok', hour12: false };
  const date = now.toLocaleDateString('th-TH', { ...opts, day:'2-digit', month:'2-digit', year:'2-digit' });
  const time = now.toLocaleTimeString('th-TH', { ...opts, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('date-display').textContent = date;
  document.getElementById('time-display').textContent = time;
}
updateClock();
setInterval(updateClock, 1000);

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + `<span class="match">${text.slice(idx, idx + query.length)}</span>` + text.slice(idx + query.length);
}

function renderList() {
  const list = document.getElementById('panel-list');
  const setData = SETS[currentSet];
  const q = document.getElementById('search-input').value.trim();
  list.innerHTML = '';

  const filtered = q
    ? setData.items.filter(i => i.name.toLowerCase().includes(q.toLowerCase()))
    : setData.items;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-list">ไม่พบรายการที่ค้นหา</div>`;
    updateUI();
    return;
  }

  filtered.forEach(item => {
    const key = `${currentSet}:${item.name}`;
    const isChecked = selected.has(key);

    const row = document.createElement('label');
    row.className = 'lottery-row' + (isChecked ? ' checked' : '');
    row.innerHTML = `
      <div class="cb-wrap">
        <input type="checkbox" name="lottery_type" value="${item.name}"${isChecked ? ' checked' : ''}>
        <div class="cb-box">
          <svg width="9" height="7" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l3 3 5-6" stroke="#0a0b0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <span class="row-label">${highlight(item.name, q)}</span>
      ${item.time ? `<span class="row-time">${item.time}</span>` : ''}
    `;

    const cb = row.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) { selected.add(key); row.classList.add('checked'); }
      else            { selected.delete(key); row.classList.remove('checked'); }
      updateUI();
    });

    list.appendChild(row);
  });

  updateUI();
}

function updateUI() {
  const total = SETS[currentSet].items.length;
  const checkedInSet = SETS[currentSet].items.filter(i => selected.has(`${currentSet}:${i.name}`)).length;
  document.getElementById('selected-count').textContent = `เลือก ${checkedInSet} / ${total}`;

  const totalSelected = selected.size;
  const btn = document.getElementById('btn-gen');
  btn.disabled = totalSelected === 0;
  btn.classList.toggle('ready', totalSelected > 0);
  btn.textContent = totalSelected > 0 ? `สร้างรูปภาพ (${totalSelected})` : 'สร้างรูปภาพ';

  const allCb = document.getElementById('select-all-cb');
  const allChecked = checkedInSet === total && total > 0;
  allCb.checked = allChecked;
  allCb.indeterminate = checkedInSet > 0 && !allChecked;
}

function switchSet(idx) {
  currentSet = idx;
  document.querySelectorAll('.set-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    // อัปเดตให้รองรับหน้าจอ iPad (<= 1024px)
    if(idx === i && window.innerWidth <= 1024 && i !== 2) {
      t.innerHTML = `SET ${i+1}`; 
    } else if (i !== 2) {
      t.innerHTML = `SET<br class="desktop-br"> ${i+1}`;
    }
  });
  document.getElementById('search-input').value = '';
  renderList();
}

function toggleAll(checked) {
  SETS[currentSet].items.forEach(item => {
    const key = `${currentSet}:${item.name}`;
    if (checked) selected.add(key);
    else         selected.delete(key);
  });
  renderList();
}

document.getElementById('main-form').addEventListener('submit', () => {
  document.getElementById('loading').classList.add('show');
  setTimeout(() => {
    document.getElementById('loading').classList.remove('show');
  }, 4000);
});

renderList();

// ซ่อน <br> ในหน้าจอ iPad และ มือถือ (<= 1024px)
window.addEventListener('resize', () => {
  document.querySelectorAll('.desktop-br').forEach(br => {
    br.style.display = window.innerWidth <= 1024 ? 'none' : 'block';
  });
});

if (window.innerWidth <= 1024) {
  document.querySelectorAll('.desktop-br').forEach(br => br.style.display = 'none');
}
